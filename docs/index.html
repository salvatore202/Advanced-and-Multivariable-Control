<!DOCTYPE html>

<head>

  <title>Advanced Control - Simulink Reports</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: #0f172a;

      background: linear-gradient(135deg, #1e3a8a, #0f172a);

      background: #1e293b;

      border-radius: 12px;
      padding: 25px;
      text-decoration: none;
      color: inherit;
      transition: 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      background: #273449;
    }

    .card h2 {
      margin: 0;
      color: #60a5fa;
    }

    .card p {
      margin-top: 8px;
      color: #cbd5e1;
      font-size: 0.95rem;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #64748b;
      font-size: 0.8rem;
    }

    .card-group {
      display: flex;
      flex-direction: column;
      gap: 20px; /* distanza tra le card */
    }
  </style>
</head>

<body>

<header>
